name: authentic-voice
version: 1.0.0
description: ปลั๊กอินการเขียนด้วยน้ำเสียงมนุษย์จริง – เพิ่มความเป็นต้นฉบับ ความมีชีวิตชีวา และความสม่ำเสมอของเอกลักษณ์เฉพาะตัว
type: feature
author: ชุมชนนักเขียนนิยาย
commands:
  - id: authentic-voice
    file: commands/authentic-voice.md
    description: เริ่มโหมดการเขียนด้วยน้ำเสียงมนุษย์จริง (อิงจากคลังข้อมูลส่วนตัวและรายละเอียดในชีวิต)
  - id: authenticity-audit
    file: commands/authenticity-audit.md
    description: ตรวจสอบและให้คำแนะนำในการปรับแก้ข้อความที่มีอยู่เพื่อเพิ่ม “ความเป็นมนุษย์”
experts:
  - id: authentic-editor
    file: experts/authentic-editor.md
    title: บรรณาธิการน้ำเสียงมนุษย์จริง
    description: เชี่ยวชาญในการปรับแก้ข้อความให้มีความเป็นธรรมชาติและมีรายละเอียดของชีวิตมากขึ้น
dependencies:
  core: ">=0.5.0"
installation:
  message: |
    ✅ ติดตั้งปลั๊กอินน้ำเสียงมนุษย์จริงสำเร็จ

    คำแนะนำการใช้งาน:
    1. กรอกคำติดปาก สำนวนที่ใช้บ่อย ประสบการณ์ในชีวิต และคำศัพท์เฉพาะสายงานของคุณลงในไฟล์ .specify/memory/personal-voice.md
    2. ใช้คำสั่ง /authentic-voice ในผู้ช่วย AI เพื่อเข้าสู่โหมดการเขียนด้วยน้ำเสียงมนุษย์จริง
    3. เรียกใช้คำสั่ง /authenticity-audit บนข้อความที่มีอยู่เพื่อรับรายการตรวจสอบและข้อเสนอแนะในการปรับปรุง

    เป้าหมาย: เพิ่มความเป็นต้นฉบับ ความมีชีวิตชีวา และความสม่ำเสมอของการแสดงออกเฉพาะตัว ช่วยสร้างบุคลิกที่น่าเชื่อถือและรูปแบบการเขียนที่มั่นคง
